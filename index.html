<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MF Lie Detector - Pro Mastery v6.14</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b12; --surface: #0f172a; --surface2: #1e293b;
            --border: #334155; --accent: #10b981; --accent2: #f59e0b;
            --red: #ef4444; --text: #f1f5f9; --muted: #94a3b8;
            --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* COMPARTMENT 1: VISUALIZATION LAYOUT */
        .chart-frame {
            position: relative;
            flex-grow: 1;
            width: 100%;
            min-height: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* The Viewport contains both Canvas (Static) and Overlay (Dynamic) */
        .viewport {
            position: relative;
            flex: 1;
            width: 100%;
            overflow: hidden;
            touch-action: none;
        }

        canvas { position: absolute; inset: 0; z-index: 1; width: 100% !important; height: 100% !important; }

        /* COMPARTMENT 2: CURSOR & INTERACTION OVERLAY */
        .cursor-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .v-line {
            position: absolute;
            top: 0; bottom: 0;
            width: 1px;
            border-left: 1px dashed rgba(148, 163, 184, 0.5);
            display: none;
        }

        .h-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            border-top: 1px dashed rgba(148, 163, 184, 0.5);
            display: none;
        }

        .data-tag {
            position: absolute;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            display: none;
            z-index: 20;
        }

        /* UI Elements */
        .hud { display: flex; justify-content: space-around; background: var(--surface); padding: 10px; border-bottom: 1px solid var(--border); }
        .hud-item { text-align: center; }
        .hud-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; display: block; }
        .hud-val { font-family: var(--mono); font-size: 1.1rem; font-weight: bold; }
        
        .controls { height: 80px; background: var(--surface2); display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .btn { border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--mono); font-size: 0.7rem; border-radius: 4px; cursor: pointer; }
        .btn-buy { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="hud">
        <div class="hud-item"><span class="hud-label">NAV</span><div id="valNav" class="hud-val">--</div></div>
        <div class="hud-item"><span class="hud-label">D-RSI</span><div id="valDRsi" class="hud-val">--</div></div>
        <div class="hud-item"><span class="hud-label">W-RSI</span><div id="valWRsi" class="hud-val">--</div></div>
        <div class="hud-item"><span class="hud-label">DELTA</span><div id="valDelta" class="hud-val">--</div></div>
    </div>

    <div class="chart-frame">
        <div class="viewport" id="mainViewport">
            <canvas id="priceChart"></canvas>
            <div class="cursor-overlay" id="priceOverlay">
                <div class="v-line"></div>
                <div class="h-line"></div>
                <div class="data-tag"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-buy" onclick="nextDay()">NEXT DAY</button>
        <button class="btn" onclick="trade('BUY')">BUY</button>
        <button class="btn" onclick="trade('SELL')">SELL</button>
        <button class="btn" onclick="location.reload()">RESET</button>
    </div>

<script>
/** * COMPARTMENT: CALCULATIONS ENGINE
 */
class MarketMath {
    static calculateRSI(prices, period = 14) {
        if (prices.length <= period) return 50;
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            let d = prices[i] - prices[i - 1];
            d > 0 ? gains += d : losses -= d;
        }
        let avgGain = gains / period; let avgLoss = losses / period;
        for (let i = period + 1; i < prices.length; i++) {
            let d = prices[i] - prices[i - 1];
            avgGain = ((avgGain * (period - 1)) + (d > 0 ? d : 0)) / period;
            avgLoss = ((avgLoss * (period - 1)) + (d < 0 ? -d : 0)) / period;
        }
        return avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
    }
}

/** * COMPARTMENT: VISUALIZATION ENGINE (CHART PAINTER)
 */
class ChartPainter {
    constructor(id) {
        this.ctx = document.getElementById(id).getContext('2d');
        this.chart = null;
    }

    draw(dataPoints) {
        const labels = dataPoints.map((_, i) => i);
        const values = dataPoints.map(p => p.nav);

        if (this.chart) this.chart.destroy();
        this.chart = new Chart(this.ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderColor: '#10b981',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(16, 185, 129, 0.05)'
                }]
            },
            options: {
                animation: false,
                responsive: true,
                maintainAspectRatio: false,
                events: [], // Optimization: Chart doesn't listen to mouse
                scales: { 
                    x: { display: false },
                    y: { grid: { color: '#1e293b' }, position: 'right' }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
}

/** * COMPARTMENT: INTERACTION ENGINE (CURSOR TRACKER)
 */
class CursorTracker {
    constructor(overlayId, painter) {
        this.overlay = document.getElementById(overlayId);
        this.vline = this.overlay.querySelector('.v-line');
        this.hline = this.overlay.querySelector('.h-line');
        this.tag = this.overlay.querySelector('.data-tag');
        this.painter = painter;
        this.data = [];
    }

    init(data) {
        this.data = data;
        const viewport = this.overlay.parentElement;
        
        viewport.addEventListener('mousemove', (e) => this.update(e));
        viewport.addEventListener('touchstart', (e) => this.update(e.touches[0]), {passive: true});
        viewport.addEventListener('mouseleave', () => this.hide());
    }

    update(e) {
        if (!this.painter.chart) return;
        
        const rect = this.painter.chart.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const chart = this.painter.chart;

        // Move Visual Elements
        this.vline.style.left = `${x}px`;
        this.hline.style.top = `${y}px`;
        this.vline.style.display = 'block';
        this.hline.style.display = 'block';

        // Get Data Index
        const index = Math.round(chart.scales.x.getValueForPixel(x));
        if (index >= 0 && index < this.data.length) {
            const point = this.data[index];
            
            // Update HUD
            document.getElementById('valNav').innerText = `₹${point.nav.toFixed(2)}`;
            document.getElementById('valDRsi').innerText = Math.round(point.dRsi);
            document.getElementById('valWRsi').innerText = Math.round(point.wRsi);
            document.getElementById('valDelta').innerText = Math.round(point.dRsi - point.wRsi);
            
            // Position Tag
            this.tag.style.left = `${x + 10}px`;
            this.tag.style.top = `${y - 25}px`;
            this.tag.innerText = `₹${point.nav.toFixed(2)}`;
            this.tag.style.display = 'block';
        }
    }

    hide() {
        this.vline.style.display = 'none';
        this.hline.style.display = 'none';
        this.tag.style.display = 'none';
    }
}

// APP STATE
let history = [];
let currentData = [];
const painter = new ChartPainter('priceChart');
const tracker = new CursorTracker('priceOverlay', painter);

// Mock Data Generator for Logic Test
function init() {
    let val = 100;
    for(let i=0; i<200; i++) {
        val += (Math.random() - 0.48) * 3;
        history.push(val);
    }
    processDay();
}

function processDay() {
    const prices = history.slice(0, currentData.length + 50);
    const dRsi = MarketMath.calculateRSI(prices, 14);
    const wRsi = MarketMath.calculateRSI(prices.filter((_, i) => i % 5 === 0), 14);
    
    currentData.push({
        nav: prices[prices.length - 1],
        dRsi: dRsi,
        wRsi: wRsi
    });

    painter.draw(currentData);
    tracker.init(currentData);
}

function nextDay() {
    processDay();
}

window.onload = init;
</script>
</body>
</html>
