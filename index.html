<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MF Lie Detector - Mastery Pro v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #080b12;
    --surface: #0f172a;
    --surface2: #1e293b;
    --border: #334155;
    --accent: #10b981;
    --accent2: #f59e0b;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

  /* Header */
  .app-header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: var(--mono); font-weight: 700; font-size: 0.9rem; color: var(--accent); }
  .game-stats { display: flex; gap: 1rem; font-family: var(--mono); font-size: 0.75rem; }
  .stat-val { color: var(--accent); font-weight: 700; }

  /* Main Layout - Responsive Grid */
  .main-sim { flex-grow: 1; display: grid; grid-template-columns: 1fr; overflow-y: auto; padding-bottom: 100px; }
  
  @media (min-width: 900px) {
    .main-sim { grid-template-columns: 3fr 1fr; height: calc(100vh - 140px); overflow: hidden; }
  }

  /* Left Panel: Chart */
  .chart-container { background: var(--bg); padding: 1rem; display: flex; flex-direction: column; min-height: 400px; }
  @media (min-width: 900px) { .chart-container { height: 100%; } }
  .chart-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .chart-wrap { flex-grow: 1; position: relative; min-height: 300px; }

  /* Right Panel: Side UI */
  .side-panel { background: var(--surface); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  
  /* Large Regime Block */
  .regime-block { width: 100%; padding: 1.2rem; border-radius: 8px; text-align: center; font-family: var(--mono); font-weight: 700; font-size: 1.4rem; text-transform: uppercase; border: 2px solid transparent; }
  .reg-A { background: rgba(16, 185, 129, 0.1); color: var(--accent); border-color: var(--accent); }
  .reg-B { background: rgba(245, 158, 11, 0.1); color: var(--accent2); border-color: var(--accent2); }
  .reg-C { background: rgba(239, 68, 68, 0.1); color: var(--red); border-color: var(--red); }

  .audit-card { background: var(--surface2); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); }
  .label-sm { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
  
  .rsi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rsi-box { text-align: center; }
  .rsi-num { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; }
  
  .psy-logic { font-size: 0.85rem; color: var(--text); font-style: italic; line-height: 1.5; border-left: 2px solid var(--accent); padding-left: 10px; }

  /* Action Bar - Mobile Fixed */
  .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0 10px; z-index: 200; }
  .btn { flex: 1; font-family: var(--mono); font-weight: 700; padding: 0.8rem 0; border-radius: 6px; cursor: pointer; border: 1px solid transparent; text-transform: uppercase; font-size: 0.75rem; max-width: 120px; }
  .btn-buy { border-color: var(--accent); color: var(--accent); background: transparent; }
  .btn-sell { border-color: var(--red); color: var(--red); background: transparent; }
  .btn-hold { border-color: var(--muted); color: var(--muted); background: transparent; }

  /* Setup Screen */
  #setupScreen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  .dropdown { background: var(--surface); border: 1px solid var(--border); color: white; padding: 1rem; width: 100%; max-width: 350px; margin-bottom: 2rem; border-radius: 8px; font-family: var(--sans); }

  #ov { display: none; position: fixed; inset: 0; background: rgba(8, 11, 18, 0.98); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  .spin { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="ov"><div class="spin"></div><div style="font-family: var(--mono); color: var(--accent); font-size: 0.8rem; margin-top: 15px;">SYNCING DATA...</div></div>

<header class="app-header">
  <div class="logo">MF LIE DETECTOR PRO</div>
  <div class="game-stats" id="gameStats" style="visibility: hidden;">
    <div>NW: <span id="nwVal" class="stat-val">₹100k</span></div>
  </div>
</header>

<div id="setupScreen">
  <h1 style="margin-bottom: 1rem; font-size: 2rem;">Mastery Sim</h1>
  <p style="color:var(--muted); margin-bottom: 2rem; font-size: 0.9rem;">Dates are hidden. Trade ₹100k capital based on RSI regimes.</p>
  <select id="fundSelect" class="dropdown">
    <option value="118989">HDFC Flexi Cap - Direct Growth</option>
    <option value="119062">ICICI Pru Flexicap - Direct Growth</option>
    <option value="120517">ABSL Flexi Cap - Direct Growth</option>
    <option value="103096">Kotak Flexicap - Direct Growth</option>
  </select>
  <button class="btn btn-buy" style="max-width: 200px;" onclick="initGame()">Start Simulation</button>
</div>

<main class="main-sim" id="gameUI" style="display: none;">
  <section class="chart-container">
    <div class="chart-header">
      <div>
        <span class="label-sm" id="simDay">Day 0</span>
        <h3 id="simNav" style="font-size: 1.2rem;">NAV: --</h3>
      </div>
      <div style="text-align: right;">
        <span class="label-sm">Filter</span>
        <div style="font-family: var(--mono); font-size: 0.7rem; color: var(--accent2);">WMA 20</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </section>

  <aside class="side-panel">
    <div id="regimeBlock" class="regime-block">REGIME --</div>
    <div class="audit-card">
      <div class="rsi-row">
        <div class="rsi-box"><span class="label-sm">Weekly RSI</span><div id="wRsi" class="rsi-num">--</div></div>
        <div class="rsi-box"><span class="label-sm">Daily RSI</span><div id="dRsi" class="rsi-num">--</div></div>
      </div>
    </div>
    <div class="audit-card">
      <span class="label-sm">Psychology Logic</span>
      <div id="psyMsg" class="psy-logic">Analyze institutional flow.</div>
    </div>
  </aside>
</main>

<footer class="action-bar" id="gameControls" style="display: none;">
  <button class="btn btn-buy" onclick="trade('BUY')">Buy 25%</button>
  <button class="btn btn-hold" onclick="nextDay()">Hold</button>
  <button class="btn btn-sell" onclick="trade('SELL')">Sell All</button>
</footer>

<script>
let fullHistory = [], currentIdx = 0, simStartIdx = 0, chart = null;
let cash = 100000, units = 0;

async function initGame() {
  const code = document.getElementById('fundSelect').value;
  document.getElementById('ov').style.display = 'flex';
  try {
    const res = await fetch(`https://api.mfapi.in/mf/${code}`);
    const data = await res.json();
    fullHistory = data.data.map(d => ({nav: parseFloat(d.nav), date: d.date})).reverse();
    simStartIdx = Math.floor(Math.random() * (fullHistory.length - 450)) + 150;
    currentIdx = simStartIdx;
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('gameUI').style.display = 'grid';
    document.getElementById('gameStats').style.visibility = 'visible';
    document.getElementById('gameControls').style.display = 'flex';
    updateDisplay();
  } catch(e) { alert("Data error."); }
  document.getElementById('ov').style.display = 'none';
}

function calculateRSI(prices, period = 14) {
  if (prices.length <= period) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    let d = prices[prices.length - period + i] - prices[prices.length - period + i - 1];
    d > 0 ? gains += d : losses -= d;
  }
  gains /= period; losses /= period;
  return 100 - (100 / (1 + (gains / (losses || 0.0001))));
}

function calculateWMA(prices, period = 20) {
  if (prices.length < period) return null;
  let sum = 0, weightSum = (period * (period + 1)) / 2;
  for (let i = 0; i < period; i++) {
    sum += prices[prices.length - 1 - i] * (period - i);
  }
  return sum / weightSum;
}

function updateDisplay() {
  const visible = fullHistory.slice(0, currentIdx + 1);
  const currentNav = visible[visible.length - 1].nav;
  const prices = visible.map(v => v.nav);
  const dRsi = calculateRSI(prices);
  const wRsi = calculateRSI(prices.filter((_, i) => i % 5 === 0));

  document.getElementById('simDay').textContent = `Day ${currentIdx - simStartIdx}`;
  document.getElementById('simNav').textContent = `NAV: ₹${currentNav.toFixed(2)}`;
  document.getElementById('dRsi').textContent = Math.round(dRsi);
  document.getElementById('wRsi').textContent = Math.round(wRsi);
  
  const color = (v) => v >= 50 ? '#10b981' : v >= 40 ? '#f59e0b' : '#ef4444';
  document.getElementById('dRsi').style.color = color(dRsi);
  document.getElementById('wRsi').style.color = color(wRsi);

  const block = document.getElementById('regimeBlock');
  block.classList.remove('reg-A', 'reg-B', 'reg-C');
  if(wRsi >= 50) { block.textContent = "Regime A"; block.classList.add('reg-A'); }
  else if(wRsi >= 40) { block.textContent = "Regime 2"; block.classList.add('reg-B'); }
  else { block.textContent = "Regime 3"; block.classList.add('reg-C'); }

  let msg = wRsi >= 50 ? (dRsi <= 50 ? "Regime A Pullback. Optimal Entry." : "Regime A: Bull Trend.") : (wRsi >= 40 ? "Regime 2: Fatigue." : "Regime 3: Trust Broken. Exit.");
  document.getElementById('psyMsg').textContent = msg;

  updateStats(currentNav);
  renderChart(visible.slice(-80));
}

function trade(type) {
  const nav = fullHistory[currentIdx].nav;
  if(type === 'BUY') { const amt = cash * 0.25; units += amt / nav; cash -= amt; }
  else { cash += units * nav; units = 0; }
  nextDay();
}

function nextDay() { if(currentIdx < fullHistory.length - 1) { currentIdx++; updateDisplay(); } }

function updateStats(nav) {
  const nw = cash + (units * nav);
  document.getElementById('nwVal').textContent = `₹${Math.round(nw/1000)}k`;
}

function renderChart(data) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if(chart) chart.destroy();
  const wmaData = data.map((_, i) => {
    const windowEnd = currentIdx - (data.length - 1) + i;
    const windowPrices = fullHistory.slice(0, windowEnd + 1).map(h => h.nav);
    return calculateWMA(windowPrices, 20);
  });
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_, i) => i),
      datasets: [
        { data: data.map(d => d.nav), borderColor: '#10b981', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' },
        { data: wmaData, borderColor: '#f59e0b', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, fill: false }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1e293b' }, ticks: { display: false } } } }
  });
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
