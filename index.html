<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MF Lie Detector - Pro Mastery v6.20</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #080b12; --surface: #0f172a; --surface2: #1e293b;
    --border: #334155; --accent: #10b981; --accent2: #f59e0b;
    --red: #ef4444; --text: #f1f5f9; --muted: #94a3b8;
    --gold: #fbbf24;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  canvas { touch-action: none; }

  .app-header { display:flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: var(--mono); font-weight: 700; font-size: 0.85rem; color: var(--accent); }

  .networth-header { display: flex; justify-content: space-around; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 5px; flex-shrink: 0; }
  .nw-col { display: flex; flex-direction: column; align-items: center; }
  .nw-lbl { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .nw-val { font-family: var(--mono); font-size: 1.2rem; font-weight: 400; color: var(--text); } 

  #alertBanner, #liveAlertBanner { display: none; text-align: center; padding: 8px; font-family: var(--mono); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; animation: pulseAlert 1.5s infinite; border-bottom: 1px solid rgba(0,0,0,0.2); }
  
  .main-sim { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 150px; }
  .chart-container { background: var(--bg); padding: 5px; height: 42vh; min-height: 280px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
  
  /* THE PRO HUD STRIP */
  .hud-display {
      position: absolute;
      top: 25px; left: 10px;
      z-index: 100;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      background: rgba(8, 11, 18, 0.8);
      padding: 3px 6px;
      border-radius: 3px;
      pointer-events: none;
      border: 1px solid var(--border);
  }

  .chart-split { display: flex; flex-direction: column; flex-grow: 1; position: relative; }
  .chart-main-pane { flex: 3; position: relative; min-height: 0; }
  .chart-delta-pane { flex: 1.2; position: relative; min-height: 0; border-top: 1px dashed var(--border); margin-top: 5px; padding-top: 5px;}

  .indicator-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .ind-box { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; border-right: 1px solid var(--border); }
  .ind-box:last-child { border-right: none; }
  .ind-val { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; margin-top: 2px; padding: 2px 8px; border-radius: 4px; }
  
  .reg-A { color: var(--accent); background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); }
  .reg-B { color: var(--accent2); background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent2); }
  .reg-C { color: var(--red); background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); }

  .psy-box { padding: 8px 12px; background: var(--surface); flex-grow: 1; overflow-y: auto; }
  .psy-logic { font-size: 0.85rem; color: var(--text); font-style: italic; border-left: 2px solid var(--accent); padding-left: 10px; margin-top: 6px; }

  .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface2); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; z-index: 200; }
  .btn { font-family: var(--mono); font-weight: 400; font-size: 0.7rem; padding: 10px 2px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; text-transform: uppercase; text-align: center; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border) !important; color: var(--muted) !important; background: transparent !important; }
  .btn-buy { border-color: var(--accent); color: var(--accent); background: transparent; }
  .btn-hold { border-color: var(--muted); color: var(--muted); background: transparent; }
  .btn-sell { border-color: var(--red); color: var(--red); background: rgba(239, 68, 68, 0.05); }
  .btn-profit { border-color: var(--accent2); color: var(--accent2); background: rgba(245, 158, 11, 0.05); }
  
  #setupScreen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
  .fund-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; width: 100%; max-width: 350px; margin-bottom: 0.5rem; }
  .fund-box { background: var(--surface2); border: 2px solid var(--border); color: var(--text); padding: 12px 2px; border-radius: 6px; font-family: var(--sans); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .fund-box.active { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); color: var(--accent); }
  .dropdown { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; width: 100%; max-width: 350px; margin-bottom: 1rem; border-radius: 6px; font-family: var(--sans); font-size: 0.85rem; }
  
  .custom-inputs { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 1rem; }
  .c-input-box { flex: 1; background: var(--surface2); padding: 6px; border-radius: 6px; border: 1px solid var(--border); }
  .c-label { font-size: 0.65rem; color: var(--muted); font-family: var(--mono); display: block; margin-bottom: 2px; }
  .c-num { width: 100%; background: transparent; border: none; font-weight: bold; font-size: 1rem; font-family: var(--mono); outline: none; text-align: center; color: white;}

  .tf-row { display: flex; justify-content: space-around; background: var(--surface2); padding: 5px; border-bottom: 1px solid var(--border); }
  .tf-btn { background: transparent; border: none; color: var(--muted); font-family: var(--mono); font-size: 0.75rem; padding: 5px 10px; cursor: pointer; }
  .tf-btn.active { color: var(--accent); font-weight: 700; border-bottom: 2px solid var(--accent); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 600; flex-direction: column; }
  .modal-close { padding: 12px 15px; text-align: right; color: var(--red); font-weight: bold; font-family: var(--mono); cursor: pointer; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
  #ov { display: none; position: fixed; inset: 0; background: rgba(8,11,18,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  .spin { width: 35px; height: 35px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="ov"><div class="spin"></div><div style="font-family: var(--mono); color: var(--accent); font-size: 0.7rem; margin-top: 10px;" id="ovTxt">SYNCING...</div></div>

<div id="setupScreen">
  <h1 style="margin-bottom: 0.5rem; font-size: 1.6rem;">Mastery Sim v6.20</h1>
  <p style="color:var(--muted); font-size: 0.75rem; margin-bottom: 1rem;">Heads-Up Display Engine</p>
  
  <div class="fund-grid" id="fundGrid">
    <div class="fund-box" onclick="selectAMC('HDFC', this)">HDFC</div>
    <div class="fund-box active" onclick="selectAMC('ICICI', this)">ICICI</div>
    <div class="fund-box" onclick="selectAMC('KOTAK', this)">KOTAK</div>
    <div class="fund-box" onclick="selectAMC('ABSL', this)">ABSL</div>
  </div>

  <select id="fundSelect" class="dropdown"></select>

  <div class="custom-inputs">
      <div class="c-input-box">
          <span class="c-label">PROFIT DELTA</span>
          <input type="number" id="profitDeltaIn" class="c-num" style="color: var(--accent2);" value="15">
      </div>
      <div class="c-input-box">
          <span class="c-label">SCOUT BUY</span>
          <input type="number" id="buyDeltaIn" class="c-num" style="color: var(--accent);" value="-15">
      </div>
  </div>

  <div style="display: flex; gap: 8px; width: 100%; max-width: 350px;">
    <button class="btn" style="flex: 1; font-weight: 700; border: 1px solid var(--accent); color: var(--accent);" onclick="initGame('random')">Simulator</button>
    <button class="btn" style="flex: 1; font-weight: 700; border: 1px solid var(--accent2); color: var(--accent2);" onclick="initGame('wave')">Wave Simulator</button>
    <button class="btn" style="flex: 1; border: 1px solid var(--muted); color: var(--text);" onclick="initLive()">Live Chart</button>
  </div>
</div>

<div id="liveModal" class="modal-overlay">
  <div class="modal-close">
    <span style="color: var(--accent2); font-size: 0.8rem;">LIVE COCKPIT</span>
    <span onclick="closeLive()">[ X ] CLOSE</span>
  </div>
  <div id="liveAlertBanner"></div>
  <div class="tf-row" id="liveTfRow">
    <button class="tf-btn active" onclick="updateLiveChart(125, this)">6M</button>
    <button class="tf-btn" onclick="updateLiveChart(250, this)">1Y</button>
  </div>
  <div class="chart-container" style="flex-grow: 1;">
    <div id="liveHud" class="hud-display">TOUCH TO INSPECT</div>
    <div class="chart-split">
      <div class="chart-main-pane"><canvas id="liveChartCanvas"></canvas></div>
      <div class="chart-delta-pane"><canvas id="liveDeltaCanvas"></canvas></div>
    </div>
  </div>
</div>

<div id="gameUI" style="display: none; height: 100vh; flex-direction: column;">
  <header class="app-header">
    <div class="logo">LIE DETECTOR V6.20</div>
    <button class="btn" style="border: 1px solid var(--red); color: var(--red); padding: 4px 8px;" onclick="location.reload()">EXIT</button>
  </header>

  <div class="networth-header">
    <div class="nw-col"><span class="nw-lbl">Net Worth</span><span class="nw-val" id="nwVal" style="color: var(--accent)">₹100,000</span></div>
    <div class="nw-col"><span class="nw-lbl">Max Pain</span><span class="nw-val" id="ddVal" style="color: var(--red)">0%</span></div>
  </div>

  <div class="chart-container">
    <div id="simHud" class="hud-display">TOUCH TO INSPECT</div>
    <div class="chart-split">
        <div class="chart-main-pane"><canvas id="mainChart"></canvas></div>
        <div class="chart-delta-pane"><canvas id="deltaChart"></canvas></div>
    </div>
  </div>

  <div class="indicator-row">
    <div class="ind-box"><span class="label-sm">Day</span><div id="simDay" class="ind-val">0</div></div>
    <div class="ind-box"><span class="label-sm">Regime</span><div id="regimeBlock" class="ind-val">--</div></div>
  </div>

  <div class="psy-box">
    <div id="psyMsg" class="psy-logic">Analyzing institutional flow...</div>
  </div>

  <footer class="action-bar">
    <button class="btn btn-buy" onclick="trade('BUY25')">Buy 25%</button>
    <button class="btn btn-hold" onclick="nextDay()">Hold</button>
    <button class="btn btn-profit" onclick="trade('SELL_PROFIT')">Profit</button>
    <button class="btn btn-sell" onclick="trade('SELLALL')">Sell All</button>
  </footer>
</div>

<script>
// --- CORE DATA ---
const amcFunds = {
  'ICICI': [{ name: '[MF] ICICI Flexicap - Growth', code: '119062' }, { name: '[MF] ICICI Balanced Advantage - Growth', code: '120377' }],
  'HDFC': [{ name: '[MF] HDFC Flexi Cap - Growth', code: '118989' }],
  'KOTAK': [{ name: '[MF] KOTAK Flexicap - Growth', code: '120166' }],
  'ABSL': [{ name: '[MF] ABSL Flexi Cap - Growth', code: '120517' }]
};

function selectAMC(amc, element) {
  document.querySelectorAll('.fund-box').forEach(b => b.classList.remove('active'));
  element.classList.add('active');
  const select = document.getElementById('fundSelect');
  select.innerHTML = '';
  amcFunds[amc].forEach(f => {
    let opt = document.createElement('option'); opt.value = f.code; opt.textContent = f.name;
    select.appendChild(opt);
  });
}
window.onload = () => selectAMC('ICICI', document.querySelector('.fund-box.active'));

let fullHistory = [], globalLiveData = [], currentIdx = 0, simStartIdx = 0;
let chart = null, deltaChart = null, liveChart = null, liveDeltaChart = null;
let cash = 100000, tranches = [], activeIdx = null;
let profitDeltaLevel = 15, buyDeltaLevel = -15;

async function fetchFundData() {
  const code = document.getElementById('fundSelect').value;
  document.getElementById('ov').style.display = 'flex';
  const url = `https://api.mfapi.in/mf/${code}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById('ov').style.display = 'none';
    return data.data.map(d => ({nav: parseFloat(d.nav), date: d.date})).reverse();
  } catch(e) { document.getElementById('ov').style.display = 'none'; return []; }
}

// --- CURSOR PLUGIN ---
const crosshairPlugin = {
  id: 'crosshair',
  afterDraw: (chartInstance) => {
    if (activeIdx !== null) {
      const {ctx, chartArea} = chartInstance;
      const meta = chartInstance.getDatasetMeta(0);
      if(!meta.data[activeIdx]) return;
      const x = meta.data[activeIdx].x;
      ctx.save();
      ctx.setLineDash([3, 3]); ctx.lineWidth = 1; ctx.strokeStyle = '#94a3b8';
      ctx.beginPath(); ctx.moveTo(x, chartArea.top); ctx.lineTo(x, chartArea.bottom); ctx.stroke();
      ctx.restore();
    }
  }
};

function calculateRSI(prices, period = 14) {
  if (prices.length <= period) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) { let d = prices[i] - prices[i - 1]; d > 0 ? gains += d : losses -= d; }
  let avgGain = gains / period, avgLoss = losses / period;
  for (let i = period + 1; i < prices.length; i++) {
    let d = prices[i] - prices[i - 1];
    avgGain = ((avgGain * (period - 1)) + (d > 0 ? d : 0)) / period;
    avgLoss = ((avgLoss * (period - 1)) + (d < 0 ? -d : 0)) / period;
  }
  return avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
}

// --- SYNC & HUD ENGINE ---
function sync(e, source, target, hudId, dataRef) {
  const points = source.getElementsAtEventForMode(e, 'index', { intersect: false }, true);
  if (points.length) {
    activeIdx = points[0].index;
    const item = dataRef[activeIdx];
    const prices = dataRef.slice(0, activeIdx + 1).map(d => d.nav);
    const dRsi = calculateRSI(prices, 14);
    const wRsi = calculateRSI(prices.filter((_, i) => i % 5 === 0), 14);
    const regime = wRsi >= 50 ? 'A' : (wRsi >= 40 ? 'B' : 'C');
    
    document.getElementById(hudId).innerHTML = `${item.date} | NAV: ${item.nav.toFixed(2)} | RSI: ${Math.round(dRsi)} | Reg: ${regime}`;
  } else {
    activeIdx = null;
  }
  source.update('none'); target.update('none');
}

// --- INITIALIZERS ---
async function initLive() {
  profitDeltaLevel = parseFloat(document.getElementById('profitDeltaIn').value);
  buyDeltaLevel = parseFloat(document.getElementById('buyDeltaIn').value);
  globalLiveData = await fetchFundData();
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('liveModal').style.display = 'flex';
  updateLiveChart(125);
}

function updateLiveChart(days) {
  const slice = globalLiveData.slice(-days);
  const deltaData = slice.map((_, i) => {
      const idx = globalLiveData.length - slice.length + i;
      const p = globalLiveData.slice(0, idx+1).map(d => d.nav);
      return calculateRSI(p, 14) - calculateRSI(p.filter((_, j) => j % 5 === 0), 14);
  });

  if(liveChart) liveChart.destroy();
  if(liveDeltaChart) liveDeltaChart.destroy();

  const common = { 
    responsive: true, maintainAspectRatio: false, 
    plugins: { legend: false, tooltip: false },
    scales: { 
        x: { offset: true, ticks: { display: false } }, 
        y: { position: 'right', afterFit: (s) => s.width = 45 } 
    } 
  };

  liveChart = new Chart(document.getElementById('liveChartCanvas'), {
    type: 'line', plugins: [crosshairPlugin],
    data: { labels: slice.map(d => d.date), datasets: [{ data: slice.map(d => d.nav), borderColor: '#10b981', pointRadius: 0 }] },
    options: { ...common, onHover: (e) => sync(e, liveChart, liveDeltaChart, 'liveHud', slice) }
  });

  liveDeltaChart = new Chart(document.getElementById('liveDeltaCanvas'), {
    type: 'bar', plugins: [crosshairPlugin],
    data: { labels: slice.map(d => d.date), datasets: [{ data: deltaData, backgroundColor: '#f59e0b' }] },
    options: { ...common, scales: { ...common.scales, x: { ...common.scales.x, display: true }, y: { ...common.scales.y, min: -30, max: 30 } }, onHover: (e) => sync(e, liveDeltaChart, liveChart, 'liveHud', slice) }
  });
}

function closeLive() { document.getElementById('liveModal').style.display = 'none'; document.getElementById('setupScreen').style.display = 'flex'; }

async function initGame(mode) {
  profitDeltaLevel = parseFloat(document.getElementById('profitDeltaIn').value);
  buyDeltaLevel = parseFloat(document.getElementById('buyDeltaIn').value);
  fullHistory = await fetchFundData();
  simStartIdx = Math.floor(Math.random() * (fullHistory.length - 200)) + 50;
  currentIdx = simStartIdx;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
  updateSim();
}

function updateSim() {
  const visible = fullHistory.slice(simStartIdx - 50, currentIdx + 1);
  const deltaData = visible.map((_, i) => {
      const idx = simStartIdx - 50 + i;
      const p = fullHistory.slice(0, idx+1).map(d => d.nav);
      return calculateRSI(p, 14) - calculateRSI(p.filter((_, j) => j % 5 === 0), 14);
  });

  if(chart) chart.destroy();
  if(deltaChart) deltaChart.destroy();

  const common = { 
    responsive: true, maintainAspectRatio: false, animation: false,
    plugins: { legend: false, tooltip: false },
    scales: { 
        x: { offset: true, ticks: { display: false } }, 
        y: { position: 'right', afterFit: (s) => s.width = 45 } 
    } 
  };

  chart = new Chart(document.getElementById('mainChart'), {
    type: 'line', plugins: [crosshairPlugin],
    data: { labels: visible.map(d => d.date), datasets: [{ data: visible.map(d => d.nav), borderColor: '#3b82f6', pointRadius: 0 }] },
    options: { ...common, onHover: (e) => sync(e, chart, deltaChart, 'simHud', visible) }
  });

  deltaChart = new Chart(document.getElementById('deltaChart'), {
    type: 'bar', plugins: [crosshairPlugin],
    data: { labels: visible.map(d => d.date), datasets: [{ data: deltaData, backgroundColor: '#f59e0b' }] },
    options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, min: -30, max: 30 } }, onHover: (e) => sync(e, deltaChart, chart, 'simHud', visible) }
  });

  const latest = visible[visible.length-1];
  const prices = fullHistory.slice(0, currentIdx + 1).map(d => d.nav);
  const wrsi = calculateRSI(prices.filter((_, i) => i % 5 === 0), 14);
  const regime = wrsi >= 50 ? 'A' : (wrsi >= 40 ? 'B' : 'C');
  
  document.getElementById('simDay').textContent = currentIdx - simStartIdx;
  document.getElementById('regimeBlock').textContent = regime;
  document.getElementById('regimeBlock').className = `ind-val reg-${regime}`;
}

function nextDay() { if(currentIdx < fullHistory.length - 1) { currentIdx++; updateSim(); } }
function trade(action) { alert("Trade Logic Active"); nextDay(); }

</script>
</body>
</html>
