<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MF Lie Detector - Pro Mastery v6.13</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080b12; --surface: #0f172a; --surface2: #1e293b;
            --border: #334155; --accent: #10b981; --accent2: #f59e0b;
            --red: #ef4444; --text: #f1f5f9; --muted: #94a3b8; --gold: #fbbf24;
            --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Layout Compartments */
        .app-header { display:flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .networth-header { display: flex; justify-content: space-around; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 5px; flex-shrink: 0; }
        .chart-container { background: var(--bg); height: 42vh; min-height: 280px; display: flex; flex-direction: column; flex-shrink: 0; border-bottom: 1px solid var(--border); }
        .indicator-row { display: flex; justify-content: space-between; background: var(--surface); padding: 6px 10px; border-bottom: 1px solid var(--border); }
        .action-bar { position: fixed; bottom: 0; width: 100%; background: var(--surface2); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; height: 90px; }
        
        /* UI Components */
        .ind-box { flex: 1; text-align: center; border-right: 1px solid var(--border); }
        .ind-val { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; margin-top: 2px; }
        .btn { font-family: var(--mono); font-size: 0.7rem; padding: 10px 2px; border-radius: 4px; border: 1px solid transparent; text-transform: uppercase; cursor: pointer; }
        .reg-A { color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .reg-B { color: var(--accent2); background: rgba(245, 158, 11, 0.1); }
        .reg-C { color: var(--red); background: rgba(239, 68, 68, 0.1); }
        
        /* Overlay & Modals */
        #ov { position: fixed; inset: 0; background: rgba(8,11,18,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 600; flex-direction: column; }
    </style>
</head>
